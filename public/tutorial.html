<!DOCTYPE html>
<html lang="pt-BR" data-theme="light">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ExpeRT - Tutoriais</title>
    <link rel="stylesheet" href="style.css" />
</head>
<body>
    <div class="container">
        <header>
            <div class="header-content">
                <div class="logo">
                    <img src="imagem/logo.png.png" alt="Logo ExpeRT" class="logo-image" />
                </div>
                <nav>
                    <ul>
                        <li><a href="index.html">USAR DISPOSITIVOS</a></li>
                        <li><a href="tutorial.html" class="active">TUTORIAIS</a></li>
                        <li><a href="sobre.html">SOBRE</a></li>
                    </ul>
                </nav>
                <button class="theme-toggle" id="themeToggle" aria-label="Alternar tema">
                    ◑
                </button>
            </div>
        </header>

        <main class="main-content">
            <div class="info-page">
                <h2 class="page-title">Tutoriais</h2>
                <div class="tutorial-list">

                    <div class="tutorial-item">
                        <h3>Como usar a Plataforma ExpeRT?</h3>
                        <p>Assista ao vídeo abaixo para aprender a conectar, iniciar a coleta e exportar dados.</p>
                        
                        <div class="video-container">
                            <video controls width="100%" poster="imagem/logo.png.png">
                                <source src="videos/tutorial.mp4" type="video/mp4">
                            </video>
                        </div>
                    </div>
            </div>
        </main>

        <footer>
            <div class="status">
                <div id="connectionStatus" class="status-disconnected">
                    <span class="status-indicator"></span>
                    Desconectado
                </div>
            </div>
            <p>&copy; 2026 ExpeRT Plataforma</p>
        </footer>
    </div>

    <!-- Scripts para controle de tema -->
    <script src="js/state.js"></script>
    <script src="js/config.js"></script>
    <script src="js/theme.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
